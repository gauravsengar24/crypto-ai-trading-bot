name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (modernized modules)
        run: npx eslint modules/config/envOverrides.js modules/commandParser.js trade/orderState.js tests/unit

      - name: Test
        run: npm test -- --runInBand

      - name: Production dependency audit
        run: npm audit --omit=dev
